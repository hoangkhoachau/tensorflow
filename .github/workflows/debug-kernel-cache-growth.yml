name: Debug kernel cache growth

on:
  workflow_dispatch:

jobs:
  bazel-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Configure TensorFlow
        env:
          USE_DEFAULT_PYTHON_LIB_PATH: "1"
          TF_NEED_ROCM: "0"
          TF_NEED_CUDA: "0"
          TF_DOWNLOAD_CLANG: "0"
          CC_OPT_FLAGS: "-Wno-sign-compare"
        run: |
          export PYTHON_BIN_PATH="$(command -v python)"
          yes "" | ./configure

      - name: Run cache growth test
        env:
          TF_PYTHON_VERSION: "3.11"
        run: |
          bazel test //tensorflow/python/eager:kernel_cache_growth_test \
            --config=opt \
            --test_output=streamed \
            --jobs=4 \
            --local_ram_resources=12000
